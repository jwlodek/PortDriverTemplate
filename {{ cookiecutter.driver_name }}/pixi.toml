[workspace]
authors = ["{{ cookiecutter.author }}"]
channels = ["conda-forge"]
name = "{{ cookiecutter.driver_name }}"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
lint = "pre-commit run --all-files"
build = "make -sj"
make-paramdefs = "epicsdbtools paramdefs {{ cookiecutter.driver_name }}App/Db {{ cookiecutter.driver_name }}App/src -p {{ cookiecutter.driver_name.upper() }}"
make-bobfiles = "epicsdb2bob {{ cookiecutter.driver_name }}App/Db {{ cookiecutter.driver_name }}App/op/bob/autogenerated -d -r _RBV -t none"
ioc = "cd iocs/{{ cookiecutter.driver_name }}IOC/iocBoot/ioc{{ cookiecutter.driver_name }} && ./st.cmd"

[dependencies]
pre-commit = ">=4.5.1,<5"
clang-format = ">=21.1.8,<22"

[pypi-dependencies]
epicsdbtools = { git = "https://github.com/jwlodek/epicsdbtools.git" }
epicsdb2bob = { git = "https://github.com/NSLS2/epicsdb2bob.git" }
